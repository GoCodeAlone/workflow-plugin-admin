version: 2
builds:
  - id: workflow-plugin-admin
    main: ./cmd/workflow-plugin-admin
    binary: workflow-plugin-admin
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - plugin.json

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
